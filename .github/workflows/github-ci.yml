name: Python CI/CD Pipeline

on:
  push:
    paths:
      - 'Week 1/GitHub Actions Practice/**'
  pull_request:
    paths:
      - 'Week 1/GitHub Actions Practice/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Week 1/GitHub Actions Practice
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip  
        pip install -r requirements.txt

  test:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Week 1/GitHub Actions Practice
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: python -m pytest -v test_app.py
